{% extends "layout.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="text-danger fw-bold">Admin Dashboard</h2>
</div>

<div class="row">
    <div class="col-md-6 mb-4">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-danger text-white fw-bold">System Users</div>
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr><th>ID</th><th>Username</th><th>Role</th><th>Action</th></tr>
                    </thead>
                    <tbody id="usersTable"></tbody>
                </table>
            </div>
        </div>
    </div>
    <div class="col-md-6 mb-4">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-warning text-dark fw-bold" id="projectsCardHeader">System Projects</div>
            <div class="card-body p-0">
                <table class="table table-hover mb-0 align-middle">
                    <thead class="table-light">
                        <tr><th>ID</th><th>Project Name</th><th>Action</th></tr>
                    </thead>
                    <tbody id="projectsTable"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    if (getRole() !== 'admin') {
        alert('Access Denied');
        window.location.href = '/dashboard';
    }

    let allProjects = [];

    async function loadAdminData() {
        const [usersRes, projRes] = await Promise.all([
            fetchWithAuth('/api/admin/users'),
            fetchWithAuth('/api/admin/projects')
        ]);
        
        if (projRes && projRes.ok) {
            allProjects = await projRes.json();
            renderProjects(null);
        }

        if (usersRes && usersRes.ok) {
            const users = await usersRes.json();
            const tb = document.getElementById('usersTable');
            tb.innerHTML = '';
            users.forEach(u => {
                const promoteBtn = u.role === 'admin' 
                    ? `<button class="btn btn-sm btn-outline-secondary fw-bold shadow-sm" onclick="toggleRole(${u.id}, 'user')">Hạ quyền</button>`
                    : `<button class="btn btn-sm btn-success fw-bold shadow-sm" onclick="toggleRole(${u.id}, 'admin')">Cấp Admin</button>`;

                const statusBadge = u.is_active 
                    ? `<span class="badge bg-success shadow-sm">ACTIVE</span>`
                    : `<span class="badge bg-warning text-dark shadow-sm">PENDING</span>`;

                const approveBtn = u.is_active
                    ? `<button class="btn btn-sm btn-outline-warning fw-bold shadow-sm" onclick="toggleStatus(${u.id}, false)">Khóa</button>`
                    : `<button class="btn btn-sm btn-warning text-dark fw-bold shadow-sm border border-warning" onclick="toggleStatus(${u.id}, true)">Duyệt Ngay</button>`;

                tb.innerHTML += `<tr>
                    <td class="text-muted fw-bold">#${u.id}</td>
                    <td class="fw-bold">${u.username}</td>
                    <td><span class="badge ${u.role==='admin'?'bg-danger':'bg-primary'}">${u.role.toUpperCase()}</span> ${statusBadge}</td>
                    <td>
                        <div class="d-flex flex-wrap gap-2">
                            ${approveBtn}
                            <button class="btn btn-sm btn-info text-white shadow-sm fw-bold" onclick="viewUserProjects(${u.id}, '${u.username}')">Xem Project</button>
                            ${promoteBtn}
                            <button class="btn btn-sm btn-danger shadow-sm fw-bold" onclick="deleteUser(${u.id})">Xóa</button>
                        </div>
                    </td>
                </tr>`;
            });
        }
    }

    window.viewUserProjects = function(userId, username) {
        renderProjects(userId, username);
    }

    function renderProjects(userId, username = null) {
        const tb = document.getElementById('projectsTable');
        const header = document.getElementById('projectsCardHeader');
        tb.innerHTML = '';
        
        if (!userId) {
            header.innerText = "System Projects Viewer";
            tb.innerHTML = '<tr><td colspan="3" class="text-center text-muted py-5">Vui lòng ấn nút <b class="text-info">"Xem Projects"</b> của User bất kỳ ở bảng bên trái.</td></tr>';
            return;
        }

        header.innerHTML = `Danh sách Projects của: <span class="bg-white text-danger px-2 py-1 rounded ms-1 shadow-sm border border-danger fs-6">${username}</span>`;
        
        const userProjects = allProjects.filter(p => p.user_id === userId);
        
        if (userProjects.length === 0) {
            tb.innerHTML = '<tr><td colspan="3" class="text-center text-muted py-5">User này chưa có Project nào.</td></tr>';
            return;
        }

        userProjects.forEach(p => {
            tb.innerHTML += `<tr>
                <td class="text-muted fw-bold">#${p.id}</td>
                <td class="text-dark fw-bold fs-6">${p.name}</td>
                <td class="text-end"><a href="/project/${p.id}" class="btn btn-sm btn-primary fw-bold px-3 shadow-sm">Truy cập Dashboard &rarr;</a></td>
            </tr>`;
        });
    }

    async function toggleStatus(id, isActive) {
        if (!confirm(isActive ? 'Cấp phép cho tài khoản này tham gia hệ thống?' : 'Khóa và cấm tài khoản này đăng nhập?')) return;
        const res = await fetchWithAuth(`/api/admin/users/${id}/approve`, { 
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ is_active: isActive })
        });
        if (res.ok) {
            loadAdminData();
        } else {
            const err = await res.json();
            alert('Lỗi: ' + err.detail);
        }
    }

    async function toggleRole(id, newRole) {
        if (!confirm(`Bạn có chắc muốn đổi quyền của tài khoản nãy thành ${newRole.toUpperCase()}?`)) return;
        const res = await fetchWithAuth(`/api/admin/users/${id}/role`, { 
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ role: newRole })
        });
        if (res.ok) {
            loadAdminData();
        } else {
            const err = await res.json();
            alert('Lỗi: ' + err.detail);
        }
    }

    async function deleteUser(id) {
        if (!confirm('CHÚ Ý: Cảnh báo xóa VĨNH VIỄN User này cùng toàn bộ thiết bị/dữ liệu của họ! Quét tiếp?')) return;
        const res = await fetchWithAuth(`/api/admin/users/${id}`, { method: 'DELETE' });
        if (res.ok) {
            loadAdminData();
        } else {
            const err = await res.json();
            alert('Error: ' + err.detail);
        }
    }

    loadAdminData();
</script>
{% endblock %}
