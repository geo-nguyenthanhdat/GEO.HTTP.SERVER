{% extends "layout.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>My Projects</h2>
    <button class="btn btn-primary shadow-sm" data-bs-toggle="modal" data-bs-target="#newProjectModal">+ New Project</button>
</div>

<div class="row" id="projectsContainer">
    <div class="text-center mt-5" id="loadingSpinner">
        <div class="spinner-border text-primary" role="status"></div>
    </div>
</div>

<div class="modal fade" id="newProjectModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content border-0 shadow">
            <div class="modal-header bg-light border-0">
                <h5 class="modal-title fw-bold text-dark">Create New Project</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <div class="mb-3">
                    <label class="form-label text-muted">Project Name</label>
                    <input type="text" id="newProjectName" class="form-control form-control-lg" placeholder="e.g. Greenhouse Sensors" required>
                </div>
            </div>
            <div class="modal-footer border-0">
                <button type="button" class="btn btn-light" data-bs-dismiss="modal">Close</button>
                <button type="button" class="btn btn-primary px-4" id="saveProjectBtn">Save Project</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    async function loadProjects() {
        const response = await fetchWithAuth('/api/projects/');
        if (!response) return; 
        
        const projects = await response.json();
        const container = document.getElementById('projectsContainer');
        const spinner = document.getElementById('loadingSpinner');
        
        if (spinner) spinner.remove();
        container.innerHTML = '';
        
        if (projects.length === 0) {
            container.innerHTML = '<div class="col-12"><p class="text-muted text-center mt-5">No projects found. Create one to start aggregating your IoT devices!</p></div>';
            return;
        }

        projects.forEach(p => {
            const isDefault = p.name.includes("Default Project") ? '<span class="badge bg-secondary ms-2 align-middle" style="font-size:0.7em;">Auto-mapped</span>' : '';
            container.innerHTML += `
                <div class="col-md-4 mb-4">
                    <div class="card h-100 shadow-sm border-0">
                        <div class="card-body p-4 d-flex flex-column">
                            <h5 class="card-title fw-bold text-dark">${p.name} ${isDefault}</h5>
                            <p class="card-text text-muted small mb-4">Project ID: ${p.id}</p>
                            <div class="mt-auto d-flex gap-2">
                                <a href="/project/${p.id}" class="btn btn-outline-primary w-100 fw-bold rounded-pill">View Data</a>
                                <button class="btn btn-outline-danger fw-bold rounded-pill px-3" onclick="deleteProject(${p.id})" title="Delete Project">X</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        });
    }

    async function deleteProject(id) {
        if (!confirm('Are you sure you want to delete this project? All associated sensors and data will be permanently deleted.')) return;
        
        const response = await fetchWithAuth('/api/projects/' + id, {
            method: 'DELETE'
        });
        
        if (response && response.ok) {
            loadProjects();
        } else {
            alert('Failed to delete project.');
        }
    }

    document.getElementById('saveProjectBtn').addEventListener('click', async () => {
        const name = document.getElementById('newProjectName').value;
        if (!name) return alert('Name is required');
        
        const response = await fetchWithAuth('/api/projects/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name })
        });
        
        if (response.ok) {
            const modal = bootstrap.Modal.getInstance(document.getElementById('newProjectModal'));
            modal.hide();
            document.getElementById('newProjectName').value = '';
            loadProjects();
        } else {
            alert('Failed to create project');
        }
    });

    loadProjects();
</script>
{% endblock %}
