{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="card mt-5 shadow-sm border-0">
            <div class="card-body p-4">
                <h3 class="card-title text-center mb-4 text-success fw-bold">Register</h3>
                <form id="registerForm">
                    <div class="mb-3">
                        <label class="form-label text-muted">Username</label>
                        <input type="text" id="username" class="form-control form-control-lg" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-muted">Password</label>
                        <input type="password" id="password" class="form-control form-control-lg" required>
                    </div>
                    <button type="submit" class="btn btn-success btn-lg w-100">Sign Up</button>
                    <div class="text-center mt-3">
                        <a href="/login" class="text-decoration-none">Already have an account? Login.</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
    if (getToken()) window.location.href = '/dashboard';

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const payload = {
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
        };

        const response = await fetch('/api/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        if (response.ok) {
            alert('Registration successful! Please login.');
            window.location.href = '/login';
        } else {
            const err = await response.json();
            alert('Registration failed: ' + (err.detail || 'Username already taken'));
        }
    });
</script>
{% endblock %}
