{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="card mt-5 shadow-sm border-0">
            <div class="card-body p-4">
                <h3 class="card-title text-center mb-4 text-primary fw-bold">Login to IoT</h3>
                <form id="loginForm">
                    <div class="mb-3">
                        <label class="form-label text-muted">Username</label>
                        <input type="text" id="username" class="form-control form-control-lg" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-muted">Password</label>
                        <input type="password" id="password" class="form-control form-control-lg" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100">Login</button>
                    <div class="text-center mt-3">
                        <a href="/register" class="text-decoration-none">Create a new account</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
    if (getToken()) window.location.href = '/dashboard';

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new URLSearchParams();
        formData.append('username', document.getElementById('username').value);
        formData.append('password', document.getElementById('password').value);

        try {
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData
            });

            if (response.ok) {
                const data = await response.json();
                setToken(data.access_token, data.role);
                window.location.href = '/dashboard';
            } else {
                alert('Login failed. Please check credentials.');
            }
        } catch(err) {
            alert('Network error during login.');
        }
    });
</script>
{% endblock %}
